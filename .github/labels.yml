# Repository-owned label vocabulary. Remote setup must create these labels with the same names,
# colors, and descriptions before enabling issue forms that reference them.
- name: "type: bug"
  color: "d73a4a"
  description: "A reproducible defect in a declared project surface."
- name: "type: feature"
  color: "a2eeef"
  description: "A bounded request for new or changed behavior."
- name: "type: compatibility"
  color: "1d76db"
  description: "Secret-safe target evidence awaiting compatibility review."
- name: "type: adapter-proposal"
  color: "0e8a16"
  description: "A proposal for an independently governed device, firmware, or runtime adapter."
- name: "area: framework"
  color: "5319e7"
  description: "Common bootstrap, recovery, safety, or evidence contracts."
- name: "area: merlin-adapter"
  color: "0052cc"
  description: "The current implemented Asuswrt-Merlin reference adapter."
- name: "area: adapter-proposal"
  color: "0e8a16"
  description: "A proposed external or repository adapter subject to governance admission."
- name: "area: release-compliance"
  color: "fbca04"
  description: "Offline artifacts, licensing, complete source, SBOM, or release verification."
- name: "area: docs-community"
  color: "c5def5"
  description: "Documentation, support, governance, or community process."
- name: "status: needs-evidence"
  color: "b60205"
  description: "The claim or change needs additional reproducible evidence."
