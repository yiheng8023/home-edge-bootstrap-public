<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" data-asset-id="zh-CN-carousel-05" data-visual-system="system-atlas/v1">
<title>三条退出路线不能混用</title>
<desc>中文轮播第五页：项目退役、运行时卸载和固件恢复从共同起点分成三条不同路线。</desc>
<g id="background"><rect width="1080" height="1350" fill="#F4F1E8"/></g>
