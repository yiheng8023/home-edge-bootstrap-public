<text x="540" y="1038" fill="#0D4658" font-family="Microsoft YaHei UI" font-size="28" font-weight="700" text-anchor="middle">目标不同</text>
<text x="540" y="1080" fill="#0D4658" font-family="Microsoft YaHei UI" font-size="28" font-weight="700" text-anchor="middle">证据、风险与操作边界也不同</text>
