<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" data-asset-id="zh-CN-evidence" data-visual-system="system-atlas/v1">
<title>证据具有多个维度</title>
<desc>证据矩阵：行为、健康、身份、订阅消费、拓扑、发布完整性和边界验证彼此独立。</desc>
<g id="background"><rect width="1600" height="900" fill="#F4F1E8"/></g>
<g id="content">
<text x="72" y="48" fill="#0D4658" font-family="Microsoft YaHei UI" font-size="16" font-weight="400" text-anchor="start">HOME EDGE BOOTSTRAP</text>
<text x="1528" y="48" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="16" font-weight="400" text-anchor="end">MECHANISM / 05</text>
<line x1="72" y1="72" x2="1528" y2="72" stroke="#A9B0B4" stroke-width="2"/>
<text x="72" y="867" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="15" font-weight="400" text-anchor="start">EVIDENCE MATRIX</text>
<text x="1528" y="867" fill="#0D4658" font-family="Microsoft YaHei UI" font-size="15" font-weight="400" text-anchor="end">SYSTEM ATLAS / V1</text>
<text x="88" y="164" fill="#17202A" font-family="Microsoft YaHei UI" font-size="52" font-weight="700" text-anchor="start">证据具有多个维度</text>
<text x="92" y="214" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="24" font-weight="400" text-anchor="start">每项声明都需要对应信号</text>
<text x="92" y="248" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="24" font-weight="400" text-anchor="start">一个维度变绿不能替代另一个</text>
<line x1="92" y1="286" x2="1508" y2="286" stroke="#176B87" stroke-width="4"/>
<g id="evidence-matrix">
<rect x="86" y="398" width="184" height="176" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="6"/>
<rect x="86" y="398" width="184" height="12" fill="#176B87"/>
<text x="104" y="444" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="18" font-weight="400" text-anchor="start">01</text>
<text x="178" y="507" fill="#17202A" font-family="Microsoft YaHei UI" font-size="17" font-weight="700" text-anchor="middle">行为</text>
<circle cx="178" cy="610" r="8" fill="#176B87"/>
<rect x="296" y="398" width="184" height="176" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="6"/>
<rect x="296" y="398" width="184" height="12" fill="#0D4658"/>
<text x="314" y="444" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="18" font-weight="400" text-anchor="start">02</text>
<text x="388" y="507" fill="#17202A" font-family="Microsoft YaHei UI" font-size="17" font-weight="700" text-anchor="middle">健康</text>
<circle cx="388" cy="610" r="8" fill="#0D4658"/>
<rect x="506" y="398" width="184" height="176" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="6"/>
<rect x="506" y="398" width="184" height="12" fill="#176B87"/>
<text x="524" y="444" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="18" font-weight="400" text-anchor="start">03</text>
<text x="598" y="507" fill="#17202A" font-family="Microsoft YaHei UI" font-size="17" font-weight="700" text-anchor="middle">身份</text>
<circle cx="598" cy="610" r="8" fill="#176B87"/>
<rect x="716" y="398" width="184" height="176" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="6"/>
<rect x="716" y="398" width="184" height="12" fill="#0D4658"/>
<text x="734" y="444" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="18" font-weight="400" text-anchor="start">04</text>
<text x="808" y="507" fill="#17202A" font-family="Microsoft YaHei UI" font-size="17" font-weight="700" text-anchor="middle">订阅消费</text>
<circle cx="808" cy="610" r="8" fill="#0D4658"/>
<rect x="926" y="398" width="184" height="176" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="6"/>
<rect x="926" y="398" width="184" height="12" fill="#176B87"/>
<text x="944" y="444" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="18" font-weight="400" text-anchor="start">05</text>
<text x="1018" y="507" fill="#17202A" font-family="Microsoft YaHei UI" font-size="17" font-weight="700" text-anchor="middle">拓扑</text>
<circle cx="1018" cy="610" r="8" fill="#176B87"/>
<rect x="1136" y="398" width="184" height="176" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="6"/>
<rect x="1136" y="398" width="184" height="12" fill="#0D4658"/>
<text x="1154" y="444" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="18" font-weight="400" text-anchor="start">06</text>
<text x="1228" y="507" fill="#17202A" font-family="Microsoft YaHei UI" font-size="17" font-weight="700" text-anchor="middle">发布</text>
<circle cx="1228" cy="610" r="8" fill="#0D4658"/>
<rect x="1346" y="398" width="184" height="176" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="6"/>
<rect x="1346" y="398" width="184" height="12" fill="#176B87"/>
<text x="1364" y="444" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="18" font-weight="400" text-anchor="start">07</text>
<text x="1438" y="507" fill="#17202A" font-family="Microsoft YaHei UI" font-size="17" font-weight="700" text-anchor="middle">边界</text>
<circle cx="1438" cy="610" r="8" fill="#176B87"/>
<line x1="86" y1="666" x2="1510" y2="666" stroke="#A9B0B4" stroke-width="2"/>
<text x="798" y="730" fill="#0D4658" font-family="Microsoft YaHei UI" font-size="24" font-weight="400" text-anchor="middle">不同维度 / 分别验证</text>
<text x="798" y="772" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="18" font-weight="400" text-anchor="middle">任一维度都不能替代另一维度</text>
</g>
</g>
</svg>
