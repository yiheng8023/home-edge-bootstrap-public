<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" data-asset-id="zh-CN-carousel-02" data-visual-system="system-atlas/v1">
<title>主路径与兜底分开</title>
<desc>中文轮播第二页：路由器主路径连接局域网客户端，终端独立兜底位于另一条路径。</desc>
<g id="background"><rect width="1080" height="1350" fill="#F4F1E8"/></g>
<g id="content">
<text x="56" y="48" fill="#0D4658" font-family="Microsoft YaHei UI" font-size="16" font-weight="400" text-anchor="start">HOME EDGE BOOTSTRAP</text>
<text x="1024" y="48" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="16" font-weight="400" text-anchor="end">CAROUSEL / 02</text>
<line x1="56" y1="72" x2="1024" y2="72" stroke="#A9B0B4" stroke-width="2"/>
<text x="56" y="1317" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="15" font-weight="400" text-anchor="start">中文系统图册</text>
<text x="1024" y="1317" fill="#0D4658" font-family="Microsoft YaHei UI" font-size="15" font-weight="400" text-anchor="end">SYSTEM ATLAS / V1</text>
<text x="64" y="146" fill="#0D4658" font-family="Microsoft YaHei UI" font-size="22" font-weight="400" text-anchor="start">02 / 系统地图</text>
<text x="64" y="238" fill="#17202A" font-family="Microsoft YaHei UI" font-size="50" font-weight="700" text-anchor="start">主路径与兜底分开</text>
<text x="68" y="306" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="24" font-weight="400" text-anchor="start">路由器承载家庭网络主路径</text>
<text x="68" y="342" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="24" font-weight="400" text-anchor="start">终端兜底保持独立，故障时仍可操作。</text>
<line x1="68" y1="382" x2="1012" y2="382" stroke="#176B87" stroke-width="4"/>
<circle cx="837" cy="116" r="7" fill="#A9B0B4"/>
<circle cx="869" cy="116" r="7" fill="#176B87"/>
<circle cx="901" cy="116" r="7" fill="#A9B0B4"/>
<circle cx="933" cy="116" r="7" fill="#A9B0B4"/>
<circle cx="965" cy="116" r="7" fill="#A9B0B4"/>
<circle cx="997" cy="116" r="7" fill="#A9B0B4"/>
<g id="page-diagram">
<rect x="84" y="610" width="210" height="90" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="8"/>
<text x="189" y="662" fill="#17202A" font-family="Microsoft YaHei UI" font-size="20" font-weight="700" text-anchor="middle">外部输入</text>
<rect x="435" y="590" width="240" height="130" fill="#176B87" stroke="#176B87" stroke-width="2" rx="8"/>
<text x="555" y="664" fill="#FFFFFF" font-family="Microsoft YaHei UI" font-size="24" font-weight="700" text-anchor="middle">路由器主路径</text>
<rect x="820" y="610" width="190" height="90" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="8"/>
<text x="915" y="662" fill="#17202A" font-family="Microsoft YaHei UI" font-size="20" font-weight="700" text-anchor="middle">局域网终端</text>
<line x1="294" y1="655" x2="425.65" y2="655" stroke="#176B87" stroke-width="5"/>
<polygon points="435,655 420.5071,663.8857 420.5071,646.1143" fill="#176B87"/>
<line x1="675" y1="655" x2="810.65" y2="655" stroke="#176B87" stroke-width="5"/>
<polygon points="820,655 805.5071,663.8857 805.5071,646.1143" fill="#176B87"/>
<rect x="435" y="870" width="240" height="90" fill="#FFFFFF" stroke="#A9651A" stroke-width="2" rx="8"/>
<text x="555" y="922" fill="#17202A" font-family="Microsoft YaHei UI" font-size="20" font-weight="700" text-anchor="middle">终端独立兜底</text>
<line x1="675" y1="915" x2="908.8551" y2="705.5048" stroke="#A9651A" stroke-width="3" stroke-dasharray="10 8"/>
<polygon points="915,700 910.7066,714.3724 900.2437,702.6929" fill="#A9651A"/>
<text x="540" y="1054" fill="#0D4658" font-family="Microsoft YaHei UI" font-size="24" font-weight="400" text-anchor="middle">故障时仍保留操作入口</text>
</g>
</g>
