<text x="524" y="444" fill="#5E6872" font-family="Consolas" font-size="18" font-weight="400" text-anchor="start">03</text>
<text x="598" y="507" fill="#17202A" font-family="Segoe UI" font-size="17" font-weight="700" text-anchor="middle">IDENTITY</text>
