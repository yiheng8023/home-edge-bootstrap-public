<text x="944" y="444" fill="#5E6872" font-family="Consolas" font-size="18" font-weight="400" text-anchor="start">05</text>
<text x="1018" y="507" fill="#17202A" font-family="Segoe UI" font-size="17" font-weight="700" text-anchor="middle">TOPOLOGY</text>
<circle cx="1018" cy="610" r="8" fill="#176B87"/>
<rect x="1136" y="398" width="184" height="176" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="6"/>
