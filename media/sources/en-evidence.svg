<rect x="1346" y="398" width="184" height="176" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="6"/>
<rect x="1346" y="398" width="184" height="12" fill="#176B87"/>
<text x="1364" y="444" fill="#5E6872" font-family="Consolas" font-size="18" font-weight="400" text-anchor="start">07</text>
<text x="1438" y="507" fill="#17202A" font-family="Segoe UI" font-size="17" font-weight="700" text-anchor="middle">BOUNDARY</text>
<circle cx="1438" cy="610" r="8" fill="#176B87"/>
<line x1="86" y1="666" x2="1510" y2="666" stroke="#A9B0B4" stroke-width="2"/>
<text x="798" y="730" fill="#0D4658" font-family="Consolas" font-size="24" font-weight="400" text-anchor="middle">Independent dimensions / independently verified</text>
<text x="798" y="772" fill="#5E6872" font-family="Consolas" font-size="18" font-weight="400" text-anchor="middle">NO DIMENSION SUBSTITUTES FOR ANOTHER</text>
