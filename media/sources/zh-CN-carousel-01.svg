<text x="68" y="306" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="24" font-weight="400" text-anchor="start">一次成功不能覆盖之后的重启、漂移</text>
<text x="68" y="342" fill="#5E6872" font-family="Microsoft YaHei UI" font-size="24" font-weight="400" text-anchor="start">和上游变化；系统必须重新读取现实。</text>
