<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" role="img" data-asset-id="hero" data-visual-system="system-atlas/v1">
<title>Home Edge Bootstrap</title>
<desc>Home Edge Bootstrap system map showing external inputs, a router-primary edge, LAN clients, independent endpoint fallback, observed state, and a recovery loop.</desc>
<g id="background"><rect width="1280" height="640" fill="#F4F1E8"/></g>
<g id="content">
<text x="72" y="48" fill="#0D4658" font-family="Consolas" font-size="16" font-weight="400" text-anchor="start">HOME EDGE BOOTSTRAP</text>
<text x="1208" y="48" fill="#5E6872" font-family="Consolas" font-size="16" font-weight="400" text-anchor="end">SOCIAL PREVIEW / 00</text>
<line x1="72" y1="72" x2="1208" y2="72" stroke="#A9B0B4" stroke-width="2"/>
<text x="72" y="607" fill="#5E6872" font-family="Consolas" font-size="15" font-weight="400" text-anchor="start">SYSTEM MAP</text>
<text x="1208" y="607" fill="#0D4658" font-family="Consolas" font-size="15" font-weight="400" text-anchor="end">SYSTEM ATLAS / V1</text>
<g id="title-block">
<text x="56" y="172" fill="#17202A" font-family="Segoe UI" font-size="54" font-weight="700" text-anchor="start">Home Edge</text>
<text x="56" y="234" fill="#17202A" font-family="Segoe UI" font-size="54" font-weight="700" text-anchor="start">Bootstrap</text>
<text x="60" y="284" fill="#5E6872" font-family="Segoe UI" font-size="24" font-weight="400" text-anchor="start">A recoverable home edge,</text>
<text x="60" y="318" fill="#5E6872" font-family="Segoe UI" font-size="24" font-weight="400" text-anchor="start">made observable.</text>
<rect x="60" y="358" width="348" height="44" fill="#176B87" rx="22"/>
<text x="234" y="385" fill="#FFFFFF" font-family="Segoe UI" font-size="18" font-weight="700" text-anchor="middle">BOOTSTRAP / RECOVER / VERIFY</text>
<text x="60" y="454" fill="#0D4658" font-family="Consolas" font-size="16" font-weight="400" text-anchor="start">ROUTER-PRIMARY / ENDPOINT FALLBACK</text>
</g>
<g id="system-map">
<rect x="530" y="132" width="190" height="72" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="8"/>
<text x="625" y="175" fill="#17202A" font-family="Segoe UI" font-size="20" font-weight="700" text-anchor="middle">VERIFIED INPUTS</text>
<rect x="790" y="132" width="190" height="72" fill="#176B87" stroke="#176B87" stroke-width="2" rx="8"/>
<text x="885" y="175" fill="#FFFFFF" font-family="Segoe UI" font-size="20" font-weight="700" text-anchor="middle">ROUTER EDGE</text>
<rect x="1050" y="132" width="174" height="72" fill="#FFFFFF" stroke="#A9B0B4" stroke-width="2" rx="8"/>
<text x="1137" y="175" fill="#17202A" font-family="Segoe UI" font-size="20" font-weight="700" text-anchor="middle">LAN CLIENTS</text>
<line x1="720" y1="168" x2="781.2" y2="168" stroke="#176B87" stroke-width="4"/>
<polygon points="790,168 776.3596,176.363 776.3596,159.637" fill="#176B87"/>
<line x1="980" y1="168" x2="1041.2" y2="168" stroke="#176B87" stroke-width="4"/>
<polygon points="1050,168 1036.36,176.363 1036.36,159.637" fill="#176B87"/>
<rect x="790" y="300" width="190" height="68" fill="#E8E3D7" stroke="#0D4658" stroke-width="2" rx="8"/>
<text x="885" y="341" fill="#17202A" font-family="Segoe UI" font-size="20" font-weight="700" text-anchor="middle">OBSERVED STATE</text>
<line x1="885" y1="204" x2="885" y2="291.75" stroke="#0D4658" stroke-width="3"/>
<polygon points="885,300 877.1597,287.2121 892.8403,287.2121" fill="#0D4658"/>
<line x1="790" y1="334" x2="683.25" y2="334" stroke="#0D4658" stroke-width="3"/>
<polygon points="675,334 687.7878,326.1597 687.7878,341.8403" fill="#0D4658"/>
<text x="530" y="335" fill="#0D4658" font-family="Consolas" font-size="15" font-weight="400" text-anchor="start">RECOVERY LOOP</text>
<rect x="790" y="456" width="220" height="68" fill="#FFFFFF" stroke="#A9651A" stroke-width="2" rx="8"/>
<text x="900" y="497" fill="#17202A" font-family="Segoe UI" font-size="20" font-weight="700" text-anchor="middle">ENDPOINT FALLBACK</text>
<line x1="1010" y1="490" x2="1133.652" y2="211.54" stroke="#A9651A" stroke-width="3" stroke-dasharray="10 8"/>
<polygon points="1137,204 1138.976,218.8693 1124.645,212.5055" fill="#A9651A"/>
<text x="1020" y="486" fill="#A9651A" font-family="Consolas" font-size="14" font-weight="400" text-anchor="start">INDEPENDENT PATH</text>
</g>
</g>
</svg>
